<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - Groove Play</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="images/logo.png" alt="Groove Play" width="50"> Groove Play
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="search.html">Search</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                </ul>
                <a href="login.html" class="btn btn-outline-success mx-2">Login</a>
                <a href="registration.html" class="btn btn-outline-primary">Register</a>
            </div>
        </div>
    </nav>

    <!-- Search Section -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h2 class="text-center mb-4">Search for Songs, Artists & Genres</h2>
                <input type="text" id="searchBox" class="form-control" placeholder="Type a song, artist, or genre...">
                <div id="searchResults" class="mt-4"></div>
            </div>
        </div>
    </div>

    <!-- Featured Songs -->
    <div class="container text-center mt-5">
        <h1>Featured Songs</h1>
        <div class="row">
            <!-- Card 1 -->
            <div class="col-md-3 mb-4">
                <div class="card p-3 h-100">
                    <img src="charlie_puth.webp" class="img-fluid w-100" style="height: 250px; object-fit: cover;" alt="Artist 1">
                    <div class="card-body">
                        <h5 class="card-title">Song 1</h5>
                        <p class="card-text">Artist: John Doe</p>
                        <p class="card-text">Genre: Pop</p>
                        <button class="btn btn-primary" onclick="playSong('songs/attention.mp3')">Play</button>
                    </div>
                </div>
            </div>
            <!-- Card 2 -->
            <div class="col-md-3 mb-4">
                <div class="card p-3 h-100">
                    <img src="drake.jpeg" class="img-fluid w-100" style="height: 250px; object-fit: cover;" alt="Artist 2">
                    <div class="card-body">
                        <h5 class="card-title">Song 2</h5>
                        <p class="card-text">Artist: Jane Smith</p>
                        <p class="card-text">Genre: Rock</p>
                        <button class="btn btn-primary" onclick="playSong('songs/attention.mp3')">Play</button>
                    </div>
                </div>
            </div>
            <!-- Card 3 -->
            <div class="col-md-3 mb-4">
                <div class="card p-3 h-100">
                    <img src="billie_eilish.webp" class="img-fluid w-100" style="height: 250px; object-fit: cover;" alt="Artist 3">
                    <div class="card-body">
                        <h5 class="card-title">Song 3</h5>
                        <p class="card-text">Artist: Emily Brown</p>
                        <p class="card-text">Genre: Jazz</p>
                        <button class="btn btn-primary" onclick="playSong('songs/attention.mp3')">Play</button>
                    </div>
                </div>
            </div>
            <!-- Card 4 -->
            <div class="col-md-3 mb-4">
                <div class="card p-3 h-100">
                    <img src="lady_gaga.jpeg" class="img-fluid w-100" style="height: 250px; object-fit: cover;" alt="Artist 4">
                    <div class="card-body">
                        <h5 class="card-title">Song 4</h5>
                        <p class="card-text">Artist: Michael Lee</p>
                        <p class="card-text">Genre: Hip-Hop</p>
                        <button class="btn btn-primary" onclick="playSong('songs/attention.mp3')">Play</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Audio Player-->
    <audio id="audioPlayer" controls style="display: none;" class="mx-auto d-block mt-4"></audio>
        

    <script src="script.js"></script>
</body>
</html>
